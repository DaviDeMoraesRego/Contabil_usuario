spring.application.name=contabil-usuario-v1
server.port=${SERVER_PORT:10091}

#SECURITY
spring.security.oauth2.resourceserver.jwt.issuer-uri=${CLERK_URL}
app.cors.allowed-origins=${ALLOWED_ORIGINS:http://localhost:3000}
app.swagger.enabled=${SWAGGER_ENABLED:false}

# Database (MySQL)
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:validate}

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=${DB_DRIVER}
spring.datasource.hikari.maximum-pool-size=${DB_POOL_SIZE:3}

# Logs
logging.level.org.springframework.web=${LOG_WEB_LEVEL:DEBUG}
logging.level.org.springframework.http.converter.json=${LOG_JSON_LEVEL:DEBUG}
logging.level.org.hibernate.SQL=${LOG_SQL_LEVEL:DEBUG}

#Cluster health
management.endpoints.web.exposure.include=health
management.endpoint.health.probes.enabled=true
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true