spring.datasource.url=jdbc:h2:mem:testdb;MODE=MySQL;DB_CLOSE_DELAY=-1;INIT=CREATE SCHEMA IF NOT EXISTS CONTABIL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.properties.hibernate.default_schema=contabil
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

spring.security.oauth2.resourceserver.jwt.issuer-uri=https://clerk.contabiledu.com.br
app.cors.allowed-origins=http://localhost:3000
app.swagger.enabled=false
app.security.expected-client-id=http://localhost:3000