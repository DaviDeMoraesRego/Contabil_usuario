name: Reusable Deploy

on:
  workflow_call:
    inputs:
      service-name:
        required: true
        type: string
      deployment-name:
        required: true
        type: string
      port:
        required: true
        type: string
    secrets:
      GHCR_TOKEN:
        required: true
      KUBE_CONFIG:
        required: true
      TAILSCALE_AUTH_KEY:
        required: true

jobs:
  build-test-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Run tests
        run: ./mvnw test -B

      - name: Build with Maven
        run: ./mvnw -B package -DskipTests -q

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/davidemoraesrego/${{ inputs.service-name }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: Build and push image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Connect to Tailscale
        uses: tailscale/github-action@v2
        with:
          authkey: ${{ secrets.TAILSCALE_AUTH_KEY }}
          version: latest

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3

      - name: Configure kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBE_CONFIG }}" > $HOME/.kube/config
          chmod 600 $HOME/.kube/config

      - name: Deploy to K8s
        run: |
          IMAGE=ghcr.io/davidemoraesrego/${{ inputs.service-name }}@${{ steps.build.outputs.digest }}
          kubectl set image deployment/${{ inputs.deployment-name }} \
            ${{ inputs.service-name }}=$IMAGE \
            -n contabil-services
          kubectl rollout status deployment/${{ inputs.deployment-name }} \
            -n contabil-services \
            --timeout=300s

      - name: Verify deployment
        run: |
          kubectl get pods -n contabil-services -l app=${{ inputs.service-name }}
